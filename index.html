<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三十辐共一毂</title>
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
        }
        canvas {
            border: 1px solid #333;
            background-color: white;
        }
        .info {
            margin-top: 10px;
            font-family: Arial, sans-serif;
        }
        .cover {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #f0f0f0;
            color: black;
            display: block;
            z-index: 9999;
            display: flex;
            align-items: center
        }
    </style>
</head>
<body>
    <div class="cover" id="cover">
        <h1 id="cover-title" style="margin:auto">加载中……</h1>
    </div>
    <div class="w3-content" style="max-width:2000px; margin-top:46px">
        <div class="w3-container w3-content w3-center w3-padding-32" style="max-width:800px">
            <h2 class="w3-wide">Wheel Flat 轮扁</h2>
            <br>
            <canvas id="canvas" tabindex="1"></canvas>
            <div class="info">
                <p>整合了图形和输入api，且可以运行javascript脚本的示例。</p>
                <p>在终端按键输入英文命令，按退格键删除，按回车键执行。</p>
                <p>在终端输入save下载文件（二进制），输入upload [filename] 读取文件作为终端内名为[filename]的程序。</p>
                <p>音频api待完善。</p>
                <p>在demo程序画面上按住左键拖动以绘制图形。按Z键或B键改变颜色，按X键改变形状。</p>
            </div>
            <br>
        </div>
    </div>
    <input type="file" id="fileInput" style="display:none;" accept=".wf" onchange="loadFile()">
    
    <script type="module" src="main.js"></script>
    <script>
        window.onload = function() {
            document.getElementById('cover-title').innerText = '点击开始';
            let cover = document.getElementById('cover');
            cover.style.cursor = 'pointer';
            cover.onclick = function() {
                let cover = document.getElementById('cover');
                cover.style.display = 'none';
                buttonCallback();
            }
        }
    </script>
</body>
</html>
