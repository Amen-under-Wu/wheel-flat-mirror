<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WheelFlat - 轮扁</title>
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
        }
        canvas {
            border: 1px solid #333;
            background-color: white;
        }
        .info {
            margin-top: 10px;
            font-family: Arial, sans-serif;
        }
        .cover {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #f0f0f0;
            color: black;
            display: block;
            z-index: 9999;
            display: flex;
            align-items: center
        }
    </style>
</head>
<body>
    <div class="cover" id="cover">
        <h1 id="cover-title" style="margin:auto">加载中……</h1>
    </div>
    <div class="w3-content" style="max-width:2000px; margin-top:46px">
        <div id="container" class="w3-container w3-content w3-center w3-padding-32" style="max-width:800px">
            <h2 class="w3-wide">Wheel Flat 轮扁</h2>
            <br>
            <canvas id="canvas" tabindex="1"></canvas>
            <div class="info">
                <p id="quote"></p>
            </div>
            <br>
        </div>
    </div>
    <input type="file" id="fileInput" style="display:none;" accept=".wf" onchange="loadFile()">
    
    <script type="module" src="main.js"></script>
    <script type="module" src="audio_player.js"></script>
    <script>
        let quotes = [
            "浮名浮利何济，堪留恋处，轮回仓猝。",
            "祸福回还车转毂，荣枯反覆手藏钩。",
            "焚轮谓之颓，扶摇谓之猋。",
            "三十辐共一毂，当其无，有车之用。",
            "坎坎伐轮兮，寘之河之漘兮，河水清且沦猗。",
            "是时唯闻鸟雀闹，尽日不听车轮哗。",
            "春来芳草踏成蹊，半是车轮半马蹄。",
            "天地车轮，终则复始，极则复反，莫不咸当。",
            "轮人为轮，斩三材必以其时。",
        ];
        async function init_player() {
            await DynamicWaveformPlayer.init();
            await DynamicWaveformPlayer.play();
        }
        function append_wave(waveform) {
            DynamicWaveformPlayer.appendWaveform(waveform);
        }
        window.onload = function() {
            document.getElementById('quote').innerText = quotes[Math.floor(Math.random()*quotes.length)];
            let cover_title = document.getElementById('cover-title');
            cover_title.innerText = '点击开始';
            let cover = document.getElementById('cover');
            cover.style.cursor = 'pointer';
            cover.onclick = async function() {
                cover_title.innerText = '请稍候……（建议刷新重试）';
                await init_player();
                while (!try_init()) {}
                let cover = document.getElementById('cover');
                cover.style.display = 'none';
            }
        }
        function try_init() {
            try {
                const searchParams = new URLSearchParams(window.location.search);
                const cmd = searchParams.get("cmd");
                buttonCallback(cmd || "");
                return true;
            }
            catch (err) {
                return false;
            }
        }
    </script>
</body>
</html>
