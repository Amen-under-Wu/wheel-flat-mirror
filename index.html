<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三十辐共一毂</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
        }
        canvas {
            border: 1px solid #333;
            background-color: white;
        }
        .info {
            margin-top: 10px;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Fantasy Console Web示例</h1>
    <canvas id="canvas" tabindex="1"></canvas>
    <div class="info">
        <p>整合了图形和输入api，且可以运行javascript脚本的示例。</p>
        <p>音频api待完善。</p>
        <p>点击按钮开始运行，在画面上按住左键拖动以绘制图形。按Z键或B键改变颜色，按X键改变形状。</p>
    </div>
    <button onclick="buttonCallback()">开始</button>
    
    <script type="module" src="main.js"></script>
</body>
</html>
