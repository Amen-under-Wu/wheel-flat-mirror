<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三十辐共一毂</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
        }
        canvas {
            border: 1px solid #333;
            background-color: white;
        }
        .info {
            margin-top: 10px;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Fantasy Console Web示例</h1>
    <canvas id="canvas" tabindex="1"></canvas>
    <div class="info">
        <p>整合了简单的图形和输入api的示例。</p>
        <p>点击按钮开始运行，在画面上点击左键绘制随机颜色的十字形图案，点击右键绘制黑色十字形图案。</p>
        <p>程序每帧在控制台输出键盘和鼠标的输入捕获。</p>
    </div>
    <button onclick="buttonCallback()">开始</button>
    
    <script type="module" src="main.js"></script>
</body>
</html>
