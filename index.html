<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        body {
            background-color: #f0f0f0;
            font-family: "Lato", sans-serif;
        }
        canvas {
            border: 1px solid #333;
            background-color: white;
        }
        .info {
            margin-top: 10px;
            font-family: Arial, sans-serif;
        }
        .cover {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #f0f0f0;
            color: black;
            display: block;
            z-index: 99;
            display: flex;
            align-items: center
        }
        #navbar {
            display: none;
            z-index: 999;
        }
    </style>
</head>
<body>
    <div class="cover" id="cover">
        <h1 id="cover-title" style="margin:auto">加载中……</h1>
    </div>
    <div id="navbar">
        <div class="w3-top">
            <div class="w3-bar w3-black w3-card">
                <a class="w3-bar-item w3-button w3-padding-large w3-hide-medium w3-hide-large w3-right"
                   href="javascript:void(0)" onclick="myFunction()" title="Toggle Navigation Menu"><i
                        class="fa fa-bars"></i></a>
                <a href="/index.html" class="w3-bar-item w3-button w3-padding-large">AuW</a>
                <a href="/cx/index.html" class="w3-bar-item w3-button w3-padding-large w3-hide-small" target="_self">程序</a>
                <a href="/sb/index.html" class="w3-bar-item w3-button w3-padding-large w3-hide-small" target="_self">随笔</a>
                <a href="/xf/index.html" class="w3-bar-item w3-button w3-padding-large w3-hide-small" target="_self">想法</a>
                <a href="/ll/index.html" class="w3-bar-item w3-button w3-padding-large w3-hide-small" target="_self">联络</a>
            </div>
        </div>

        <div id="navDemo" class="w3-bar-block w3-black w3-hide w3-hide-large w3-hide-medium w3-top" style="margin-top:46px">
            <a href="/cx/index.html" class="w3-bar-item w3-button w3-padding-large" onclick="myFunction()">程序</a>
            <a href="/sb/index.html" class="w3-bar-item w3-button w3-padding-large" onclick="myFunction()">随笔</a>
            <a href="/xf/index.html" class="w3-bar-item w3-button w3-padding-large" onclick="myFunction()">想法</a>
            <a href="/ll/index.html" class="w3-bar-item w3-button w3-padding-large" onclick="myFunction()">联络</a>
        </div>
    </div>
    <div class="w3-content" style="max-width:2000px; margin-top:46px">
        <div id="container" class="w3-container w3-content w3-center w3-padding-32" style="max-width:800px">
            <h2 class="w3-wide">Wheel Flat 轮扁</h2>
            <br>
            <canvas id="canvas" tabindex="1"></canvas>
            <div class="info">
                <p id="quote"></p>
            </div>
            <br>
        </div>
    </div>
    <input type="file" id="fileInput" style="display:none;" accept=".wf" onchange="loadFile()">
    
    <script type="module" src="main.js"></script>
    <script type="module" src="audio_player.js"></script>
    <script src="/bpk.js"></script>
    <script>
        const searchParams = new URLSearchParams(window.location.search);
        const navbar = searchParams.get("from");
        if (navbar == "home") {
            document.querySelector("#navbar").style.display = "block";
        }
        let quotes = [
            "浮名浮利何济，堪留恋处，轮回仓猝。",
            "祸福回还车转毂，荣枯反覆手藏钩。",
            "焚轮谓之颓，扶摇谓之猋。",
            "三十辐共一毂，当其无，有车之用。",
            "坎坎伐轮兮，寘之河之漘兮，河水清且沦猗。",
            "是时唯闻鸟雀闹，尽日不听车轮哗。",
            "春来芳草踏成蹊，半是车轮半马蹄。",
            "天地车轮，终则复始，极则复反，莫不咸当。",
            "轮人为轮，斩三材必以其时。",
            "偏毂不可转，只翼不可翔。",
            "碌碌复碌碌，百年双转毂。",
            //"太行虽险，险可使平。轮轴自挠，牵制不停。泥潦渐久，荆棘旋生。行必不得，不如不行。",
            "盈虚用舍轮舆旋，勿学灵均远问天。",
            "百马同一衔，万轮同一规。名与身孰亲，君子宜固思。",
            "方凿不受圆，直木不为轮。揆材各有用，反性生苦辛。",
            "道险不在广，十步能摧轮。",
            "四时轮转春常少，百刻支分夜苦长。",
            "东乌西兔似车轮，劫火桑田不复论。",
            "四时轮环终又始，百年不见南山摧。",
            "循环兮不息，如彼兮车轮。",
            "三界如转轮，浮生若流水。",
        ];
        async function init_player() {
            await DynamicWaveformPlayer.init();
            await DynamicWaveformPlayer.play();
        }
        function append_wave(waveform) {
            DynamicWaveformPlayer.appendWaveform(waveform);
        }
        window.onload = function() {
            document.getElementById('quote').innerText = quotes[Math.floor(Math.random()*quotes.length)];
            let cover_title = document.getElementById('cover-title');
            cover_title.innerText = '点击开始';
            let cover = document.getElementById('cover');
            cover.style.cursor = 'pointer';
            cover.onclick = async function() {
                await init_player();
                if (!try_init()) {
                    cover_title.innerText = '请刷新重试';
                }
                else {
                    let cover = document.getElementById('cover');
                    cover.style.display = 'none';
                }
            }
        }
        function try_init() {
            try {
                const cmd = searchParams.get("cmd");
                buttonCallback(cmd || "");
                return true;
            }
            catch (err) {
                return false;
            }
        }
    </script>
</body>
</html>
